name: release

on:
  release:
    types: [published]
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      draft:
        default: false
        description: "Create a draft release"
        required: true
        type: boolean
      prerelease:
        default: false
        description: "Create a prerelease"
        required: true
        type: boolean

permissions:
  contents: write
  discussions: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      IS_PRERELEASE: ${{ github.event.inputs.prerelease || false }}
      IS_DRAFT: ${{ github.event.inputs.draft || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create release
        uses: softprops/action-gh-release@v3
        continue-on-error: true
        with:
          append_body: false
          draft: ${{ env.IS_DRAFT }}
          prerelease: ${{ env.IS_PRERELEASE }}
          tag_name: ${{ github.event.release.tag_name }}
          body: |
            ${{ github.event.release.body }}

            ## Links

              - [Crates.io](https://crates.io/crates/${{ github.event.repository.name }})
              - [Documentation](https://docs.rs/${{ github.event.repository.name }})
